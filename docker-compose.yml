# ═══════════════════════════════════════════════════════════
#
#  Services:
#    - ml-service:  FastAPI ML API (port 8000)
#    - qdrant:      Vector database (port 6333)
#    - redis:       Feature flags + Celery broker (port 6379)
#    - celery:      Async inference worker
# ═══════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── ML API Service ──────────────────────────────────────
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keabuilder-ml
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ACTIVE_MODEL=minilm
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keabuilder-celery
    command: ["python", "-m", "celery", "-A", "app.worker.tasks", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      - APP_ENV=development
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Qdrant Vector Database ─────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: keabuilder-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis (Feature Flags + Celery Broker) ───────────────
  redis:
    image: redis:7-alpine
    container_name: keabuilder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
